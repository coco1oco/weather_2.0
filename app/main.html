<!DOCTYPE html>
    
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Windy</title>
    <link rel="icon" href=".\images\icon.svg" type="image/x-icon" />
    <link rel="stylesheet" href="weather_style.css">

</head>
<body>
    
    <div id="header">
        <h1 id="dynamicHeader"></h1>
        <h2 id="dynamic-date"></h2>
        <form id="search-form" action="/search" method="get" role="search" autocomplete="off">
            <input type="search" id="query" name="q" placeholder="Search City" aria-label="Search through site content">
            <button type="submit">Search</button>
        </form>
    </div>
    <div class="container">
        <div id="weather-container">
            <h2 id="temperature"></h2>

        </div>

        <div id="forecast-container">
            <p>hotdog</p>
        </div>
    </div>        

    <script src="weather.js"></script>
    
</body>
</html>
