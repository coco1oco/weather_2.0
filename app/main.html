<!DOCTYPE html>
    
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Windy</title>
    <link rel="icon" href=".\images\icon.svg" type="image/x-icon" />
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="header">
        <h1 id="dynamicHeader"></h1>
        <h2 id="dynamic-date"></h2>
        <form class="search-form" id="search-form" action="/search" method="get" role="search" autocomplete="off">
            <input type="search" id="query" name="q" placeholder="Search City" aria-label="Search through site content">
            <button type="submit" class="submit">Search</button>
        </form>
    </div>

    <div class="body-container">
        <div class="map-card">
            <h1><map name="">Precipitation</map>
        </div>

        <div class="card">
            <img src=".\images\clear.png" alt="Weather Icon" class="weather-icon">
            <h1 class="city-name">--</h1>
            <h2 class="temperature">--</h2>
            <div class="weather-description">
                <div class="col">
                    <img src="./images/humidity.png" alt="Humidity Icon" class="icon">
                    <div>
                        <p class="Humidity">--</p>
                        <p class="humidity-value">Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="./images/wind.png" alt="Wind Icon" class="icon">
                    <div>
                        <p class="Wind">--</p>
                        <p class="wind-speed">Wind Speed</p>
                    </div>
                </div>
                <div class="col">
                    <img src="./images/feels.png" alt="FL Icon" class="icon">
                    <div>
                        <p class="Feels-like">--</p>
                        <p class="FL">Feels Like</p>
                    </div>
                </div>
            </div>
        </div>    

        <div class="forecast-card">
            <h1>5-Day Forecast</h1>
            <div class="forecast">
                <!-- Example forecast item for structure -->
                <div class="forecast-item">
                    <div class="forecast-day">Mon</div>
                    <img src="./images/clear.png" alt="Clear" class="forecast-icon">
                    <div class="forecast-temp">28°C</div>
                    <div class="forecast-highlow">
                        <span class="high">H: 30°C</span> <span class="low">L: 25°C</span>
                    </div>
                </div>
            </div>
        </div>

    </div>
    



    <script src="weather.js"></script>
    
</body>
</html>
