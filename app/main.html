<!DOCTYPE html>
    
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Windy</title>
    <link rel="icon" href=".\images\icon.svg" type="image/x-icon" />
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="header">
        <h1 id="dynamicHeader"></h1>
        <h2 id="dynamic-date"></h2>
        <form class="search-form" id="search-form" action="/search" method="get" role="search" autocomplete="off">
            <input type="search" id="query" name="q" placeholder="Search City" aria-label="Search through site content">
            <button type="submit" class="submit">Search</button>
        </form>
    </div>
    <div class="card">
        <img src=".\images\clear.png" alt="Weather Icon" class="weather-icon">
        <h1 class="city-name">Trece Martires</h1>
        <h2 class="temperature">0°c</h2>
        <div class="weather-description">
            <div class="col">
                <img src="./images/humidity.png" alt="Humidity Icon" class="icon">
                <div>
                    <p class="Humidity">0%</p>
                    <p class="humidity-value">Humidity</p>
                </div>
            </div>
            <div class="col">
                <img src="./images/wind.png" alt="Wind Icon" class="icon">
                <div>
                    <p class="Wind">0 km/h</p>
                    <p class="wind-speed">Wind Speed</p>
                </div>
            </div>
        </div>

    </div>        

    <script src="weather.js"></script>
    
</body>
</html>
